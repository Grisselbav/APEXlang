name: CI - dbLinter checks and SQL-based tests

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'README.md'
      - 'images/**'
      - '.gitignore'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - 'README.md'
      - 'images/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: APEXlang
    permissions:
      contents: read
      pages: write
      id-token: write
      security-events: write
      checks: write
      pull-requests: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'oracle'

    - name: Prepare directory to be deployed to GitHub Pages
      run: |
        mkdir -p results
        cat >> results/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting</title>
            <noscript>
              <meta http-equiv="refresh" content="1; url=apexlang.html" />
            </noscript>
            <script>
              window.location.replace("apexlang.html");
            </script>
          </head>
          <body>
            Redirecting to <a href="apexlang.html">apexlang.html/</a>...
          </body>
        </html>
        EOF

    - name: Download apexlang.ebnf
      run: |
        wget -O results/apexlang.ebnf https://docs.oracle.com/en/database/oracle/apex/26.1/apxln/apexlang.ebnf

    - name: Convert apexlang.ebnf to apexlang.w3c.ebnf
      run: |
        java Convert.java results/apexlang.ebnf results/apexlang.w3c.ebnf

    - name: Download RR
      run: |
        wget -O rr.war https://repo1.maven.org/maven2/de/bottlecaps/rr/rr-webapp/2.6/rr-webapp-2.6.war

    - name: Run RR
      run: |
        java -jar rr.war -suppressebnf -html -color:#BDE6FF -out:results/apexlang.html results/apexlang.w3c.ebnf

    - name: Upload Results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: results
        path: |
          results/*.*
        retention-days: 90

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v6

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v5
      with:
        path: results

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v5
